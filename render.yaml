services:
  - type: web
    name: theo-sign
    env: node
    region: oregon
    plan: free
    repo: https://github.com/<OWNER>/<REPO>
    branch: main
    buildCommand: npm ci && npm run build --if-present
    startCommand: node server.js
    envVars:
      - key: DEEPSEEK_API_KEY
        value: ""
        sync: false
      - key: NODE_ENV
        value: production
        sync: false

# Notes:
# - Replace <OWNER>/<REPO> with your GitHub repo path.
# - You can include additional services (databases, cron jobs) in this file.