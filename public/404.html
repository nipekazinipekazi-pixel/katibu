<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Theo Sign</title>
  <script>
    // GitHub Pages SPA fallback: redirect all 404s to index.html
    sessionStorage.redirect = location.href;
  </script>
  <meta http-equiv="refresh" content="0;URL='/'">
</head>
<body>
  <script>
    // If meta refresh didn't work, try JavaScript redirect
    if (!sessionStorage.redirected) {
      sessionStorage.redirected = true;
      location.href = '/';
    }
  </script>
</body>
</html>
